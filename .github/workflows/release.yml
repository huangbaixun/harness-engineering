name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Validate plugin manifest
        run: |
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "ERROR: .claude-plugin/plugin.json not found"
            exit 1
          fi
          # Validate JSON syntax
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          echo "✓ plugin.json is valid JSON"
          # Check version matches tag
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          TAG_VERSION="${TAG_VERSION#v}"  # strip leading 'v'
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: manifest version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version $MANIFEST_VERSION matches tag"

      - name: Package .skill file
        run: |
          SKILL_FILE="harness-engineering-${{ steps.version.outputs.VERSION }}.skill"
          zip -r "$SKILL_FILE" \
            .claude-plugin/ \
            skills/ \
            commands/ \
            agents/ \
            hooks/ \
            scripts/ \
            docs/ \
            references/ \
            evals/ \
            LICENSE \
            CONTRIBUTING.md \
            CHANGELOG.md \
            README.md \
            -x "*.DS_Store" -x "*/.git/*"
          echo "SKILL_FILE=$SKILL_FILE" >> $GITHUB_ENV
          echo "✓ Packaged $SKILL_FILE"
          ls -lh "$SKILL_FILE"

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          # Extract notes for the current version from CHANGELOG.md
          python3 << 'EOF'
          import re, sys
          version = "${{ steps.version.outputs.VERSION }}"
          version_bare = version.lstrip('v')
          content = open('CHANGELOG.md').read()
          # Match section for this version
          pattern = rf'## {re.escape(version_bare)}.*?\n(.*?)(?=\n## |\Z)'
          match = re.search(pattern, content, re.DOTALL)
          if match:
              notes = match.group(1).strip()
          else:
              notes = f"Release {version}"
          with open('/tmp/release_notes.md', 'w') as f:
              f.write(notes)
          print(notes[:200])
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: ${{ env.SKILL_FILE }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
